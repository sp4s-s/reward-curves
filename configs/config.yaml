# Shared defaults. Stage-specific configs overlay on top of this.
defaults:
  - _self_
  - experiment: sft

seed: 20260425

model:
  name: "EleutherAI/pythia-410m-deduped"
  max_seq_len: 512
  bf16: true
  use_flash_attn: true
  gradient_checkpointing: true

wandb:
  enabled: false
  project: "implicit-rl-curvature"
  entity: null
  group: null
  mode: "online" # online, offline, disabled

telemetry:
  enabled: true
  log_every: ${training.log_every}
  show_gpu_memory: true
  show_nvml: true

profiler:
  enabled: false
  trace_dir: "torch_traces"
  wait: 5
  warmup: 2
  active: 3
  repeat: 1
  profile_memory: true
  record_shapes: false
  with_stack: false

dashboard:
  enabled: true
  update_every: ${training.log_every}
  filename: "run_dashboard.html"

diagnostics:
  exact_update_norm: true
  grad_cosine: true
  final_archive: true
  archive_name: "run_artifacts.zip"

device: auto

data:
  dataset: "HuggingFaceH4/ultrafeedback_binarized"
  sft_train_size: 8000
  dpo_train_size: 16000
  probe_size: 128                # Reduced per user request
  pref_eval_size: 2000
  gen_eval_size: 1000
  min_response_tokens: 4
  max_response_tokens: 256
  oracle_holdout_pct: 0.2        # Added per user request

training:
  micro_batch_size: 8
  grad_accum: 2
  num_workers: 2
  pin_memory: true
  prefetch_factor: 2
  lr: 5.0e-7
  warmup_steps: 50
  total_steps: 4000
  save_every: 250
  log_every: 10
  beta: 0.1
  grad_clip: 1.0

curvature:
  lambda: 0.0
  n_positions: 2
  n_swaps: 2
  swap_topk: 50
  swap_distribution: "Q_topk"   # one of: Q_topk, Q_unif, Q_rand-id

gold_rm:
  source: "external"             # external | self_trained
  external_name: "OpenAssistant/reward-model-deberta-v3-large-v2"

paths:
  out_root: "runs"
  data_cache: "data/cache"
  sft_checkpoint: null

# Hydra output configuration
hydra:
  run:
    dir: ${paths.out_root}/${now:%Y-%m-%d}/${now:%H-%M-%S}_${experiment.name}
  sweep:
    dir: ${paths.out_root}/sweeps/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}_${experiment.name}
